appId: com.kanaami.juice-timer
productName: Juice
copyright: Copyright © 2026 kanaami

directories:
  output: dist-release

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  protocols:
    - name: Juice
      schemes:
        - juice
      role: Viewer

dmg:
  title: Juice

# ファイルを含める（デフォルトで全てを含み、以下のパターンで除外する）
files:
  - '!**/.DS_Store'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/.bin'
  - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
  - '!**/._*'
  # 実行に不要なディレクトリ・ファイルを除外（ビルドサイズ削減）
  - '!lambda${/*}'        # AWS Lambda + Terraform プロバイダバイナリ（約810MB）
  - '!docs${/*}'          # ドキュメント
  - '!src${/*}'           # ソース（実行は out/ のビルド成果物を使う）
  - '!**/*.map'           # ソースマップ
  - '!**/*.tsbuildinfo'   # TypeScript インクリメンタルビルド情報
  - '!CLAUDE.md'
  - '!**/*.test.{ts,tsx}'
  - '!.env'               # ビルド時に埋め込まれるため実行時は不要
  - '!.superpowers${/*}'  # 開発ツールの作業ディレクトリ
  - '!.claude${/*}'
  - '!tsconfig*.json'
